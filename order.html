<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat Pesanan</title>
<link rel="stylesheet" href="Css/style.css">
</head>
<body>

<header class="header">

    <h1>Buat Pesanan</h1>

</header>

<div class="card">

    <label>Pesanan</label>

    <textarea
    id="pesanan"
    placeholder="Contoh:

Mie Setan Lv 3 x2
Udang Rambutan x1
Es Teh x2"></textarea>

</div>

<div class="card">

    <label>Catatan</label>

    <textarea
    id="catatan"
    placeholder="Tambahan catatan"></textarea>

</div>

<div class="card">

    <label>Alamat Pengantaran</label>

    <input
    type="text"
    id="alamat"
    placeholder="Masukkan alamat lengkap">

</div>

<div class="card">

    <button id="simpanOrder">
        Kirim Pesanan
    </button>

</div>

<a href="dashboard.html">

<button>
Kembali
</button>

</a>

<script type="module" src="Js/order.js"></script>

</body>
</html>
